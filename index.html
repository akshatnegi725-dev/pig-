<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are you a pig?</title>
    <style>
        /* Styling to make it look nice and center everything */
        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fff0f5; /* Lavender blush background */
            overflow: hidden; /* Prevents scrollbars when the button moves */
        }

        .container {
            text-align: center;
            /* Creates relative space so the buttons sit nicely initially */
            position: relative; 
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 3.5rem;
            color: #ff69b4; /* Hot pink */
            margin-bottom: 30px;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
        }

        button {
            font-size: 1.5rem;
            padding: 12px 40px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        #btn-yes {
            background-color: #ffb6c1; /* Light pink */
        }

        #btn-yes:hover {
            background-color: #ff69b4;
        }

        #btn-no {
            background-color: #a9a9a9; /* Gray */
            transition: left 0.1s ease, top 0.1s ease; /* Smooth jumping */
        }

        #btn-no:hover {
            background-color: #808080;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Are you a pig? 🐷</h1>
        
        <div class="buttons-container">
            <button id="btn-yes">Yes</button>
            <button id="btn-no">No</button>
        </div>
    </div>

    <script>
        // Grab the buttons from the document
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');

        // Function to move the 'No' button
        btnNo.addEventListener('mouseover', () => {
            // Get the size of the window
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // Get the size of the button
            const btnWidth = btnNo.offsetWidth;
            const btnHeight = btnNo.offsetHeight;

            // Calculate a random new position within the screen boundaries
            const randomX = Math.floor(Math.random() * (windowWidth - btnWidth));
            const randomY = Math.floor(Math.random() * (windowHeight - btnHeight));

            // Change the button's position to 'absolute' so it can move freely
            btnNo.style.position = 'absolute';
            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        });

        // Add a fun alert when they are forced to click 'Yes'
        btnYes.addEventListener('click', () => {
            alert("Oink oink! I knew it! 🐖🎉");
        });
    </script>

</body>
</html>
